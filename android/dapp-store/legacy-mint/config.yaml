solana_mobile_dapp_publisher_portal:
  google_store_package: xyz.ghola.app
  testing_instructions: |
    The app opens to an onboarding flow, then a bottom navigation with three
    tabs: Home, Trade, and Activity. Sign in with Seeker Wallet through Mobile
    Wallet Adapter to associate a wallet.

    Reviewers can browse the Trade tab (BTC/ETH/SOL markets and charts) and
    view Seeker wallet detection in the Wallet screen without placing any
    trades. The Trade tab also lists active agents. Note that live autopilot
    trading may be limited depending on backend availability, so reviewers do
    not need to execute a live trade to evaluate the app.
