name: Launch private trading stack

# One-button path from repo to live service:
#   1. Pushes env config + production deploy of apps/web to Vercel
#   2. Provisions the Phala worker CVM through the app's own JIT
#      provisioner (/api/private-agent/provision)
#   3. Verifies the live endpoints and writes a go/no-go summary
#
# Required repository secrets (Settings -> Secrets -> Actions):
#   VERCEL_TOKEN                        Vercel account token
#   GHOLA_PRIVATE_ACCOUNT_DATABASE_URL  Neon/Postgres URL for durable state
#   PHALA_CLOUD_API_KEY                 Phala Cloud API key for the worker CVM
#                                      (only when arm_phala=true)
# Optional secrets (generated per-run when absent; note that regeneration
# re-provisions the CVM):
#   GHOLA_PRIVATE_AGENT_EXECUTION_TOKEN
#   GHOLA_PRIVATE_AGENT_PROVISION_TOKEN
#   GHOLA_PRIVATE_AGENT_FUNDING_SIGNING_KEY
# Uses existing GHOLA_AUTH_SMOKE_EMAIL / GHOLA_AUTH_SMOKE_PASSWORD for the
# live auth check when present.

on:
  workflow_dispatch:
    inputs:
      vercel_project:
        description: "Vercel project name serving ghola.xyz"
        required: true
        default: "web"
      base_url:
        description: "Public base URL to verify"
        required: true
        default: "https://ghola.xyz"
      pooled_network:
        description: "Pooled Hyperliquid network (testnet = zero-capital)"
        required: true
        default: "testnet"
        type: choice
        options: [testnet, mainnet]
      live_mode:
        description: "Hyperliquid live mode"
        required: true
        default: "tiny_fill"
        type: choice
        options: [read_only, tiny_fill, full_ticket]
      deploy_ref:
        description: "Git ref containing the private trading web app"
        required: true
        default: "main"
      arm_phala:
        description: "Arm Phala spend (provisions the paid worker CVM). Default deploys dark: spend lockdown on, no Phala key in Vercel."
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
      keep_phala_running:
        description: "Keep Phala running after an armed launch. Default false stops it after verification to cap spend."
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read

concurrency:
  group: launch-private-stack
  cancel-in-progress: false

env:
  WORKER_IMAGE: ghcr.io/anndrrson/ghola:private-agent-worker-b437850
  WORKER_IMAGE_DIGEST: sha256:02a680c6a274801f4f37b16205253ba1259596237efae5f469737621d51211b0

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          ref: ${{ inputs.deploy_ref }}

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Preflight secrets
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DB_URL: ${{ secrets.GHOLA_PRIVATE_ACCOUNT_DATABASE_URL }}
          PHALA_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          set -euo pipefail
          missing=()
          [ -n "${VERCEL_TOKEN}" ] || missing+=("VERCEL_TOKEN")
          [ -n "${DB_URL}" ] || missing+=("GHOLA_PRIVATE_ACCOUNT_DATABASE_URL")
          if [ "${{ inputs.arm_phala }}" = "true" ]; then
            [ -n "${PHALA_KEY}" ] || missing+=("PHALA_CLOUD_API_KEY (required because arm_phala=true)")
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            {
              echo "## Launch blocked: missing repository secrets"
              echo ""
              for s in "${missing[@]}"; do echo "- \`$s\`"; done
              echo ""
              echo "Add them under Settings -> Secrets and variables -> Actions, then re-run."
              echo "- VERCEL_TOKEN: vercel.com -> Account Settings -> Tokens"
              echo "- GHOLA_PRIVATE_ACCOUNT_DATABASE_URL: neon.tech free tier -> connection string"
              echo "- PHALA_CLOUD_API_KEY: cloud.phala.network -> API keys"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Resolve worker tokens
        id: tokens
        env:
          EXEC_TOKEN: ${{ secrets.GHOLA_PRIVATE_AGENT_EXECUTION_TOKEN }}
          PROV_TOKEN: ${{ secrets.GHOLA_PRIVATE_AGENT_PROVISION_TOKEN }}
          SIGN_KEY: ${{ secrets.GHOLA_PRIVATE_AGENT_FUNDING_SIGNING_KEY }}
        run: |
          set -euo pipefail
          exec_token="${EXEC_TOKEN:-$(openssl rand -hex 32)}"
          prov_token="${PROV_TOKEN:-$(openssl rand -hex 32)}"
          echo "::add-mask::${exec_token}"
          echo "::add-mask::${prov_token}"
          echo "exec_token=${exec_token}" >> "$GITHUB_OUTPUT"
          echo "prov_token=${prov_token}" >> "$GITHUB_OUTPUT"
          node <<'NODE'
          const { createPrivateKey, createPublicKey, generateKeyPairSync } = require("node:crypto");
          const { appendFileSync } = require("node:fs");

          let privateKeyB64 = (process.env.SIGN_KEY || "").trim();
          let privateKey;
          if (privateKeyB64) {
            privateKey = createPrivateKey({
              key: Buffer.from(privateKeyB64, "base64"),
              format: "der",
              type: "pkcs8",
            });
          } else {
            privateKey = generateKeyPairSync("ed25519").privateKey;
            privateKeyB64 = privateKey.export({ format: "der", type: "pkcs8" }).toString("base64");
          }
          const publicKeyB64 = createPublicKey(privateKey)
            .export({ format: "der", type: "spki" })
            .toString("base64");
          console.log(`::add-mask::${privateKeyB64}`);
          appendFileSync(
            process.env.GITHUB_OUTPUT,
            `funding_signing_key=${privateKeyB64}\nfunding_signer_public_key=${publicKeyB64}\n`,
          );
          NODE
          if [ -z "${EXEC_TOKEN}" ]; then
            echo "- NOTE: GHOLA_PRIVATE_AGENT_EXECUTION_TOKEN secret not set; generated per-run (re-runs rotate it and re-provision the CVM). Add it as a secret to make it stable." >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -z "${SIGN_KEY}" ]; then
            echo "- NOTE: GHOLA_PRIVATE_AGENT_FUNDING_SIGNING_KEY secret not set; generated per-run (re-runs rotate the worker funding signer)." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Link Vercel project
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          npx vercel@latest link --yes --project "${{ inputs.vercel_project }}" --token "$VERCEL_TOKEN"

      - name: Push production env vars to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          DB_URL: ${{ secrets.GHOLA_PRIVATE_ACCOUNT_DATABASE_URL }}
          PHALA_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
          EXEC_TOKEN: ${{ steps.tokens.outputs.exec_token }}
          PROV_TOKEN: ${{ steps.tokens.outputs.prov_token }}
          FUNDING_SIGNING_KEY: ${{ steps.tokens.outputs.funding_signing_key }}
          FUNDING_SIGNER_PUBLIC_KEY: ${{ steps.tokens.outputs.funding_signer_public_key }}
        run: |
          set -euo pipefail
          setenv() {
            local name="$1" value="$2"
            npx vercel@latest env rm "$name" production --yes --token "$VERCEL_TOKEN" >/dev/null 2>&1 || true
            printf '%s' "$value" | npx vercel@latest env add "$name" production --token "$VERCEL_TOKEN" >/dev/null
            echo "set $name"
          }
          rmenv() {
            npx vercel@latest env rm "$1" production --yes --token "$VERCEL_TOKEN" >/dev/null 2>&1 || true
            echo "removed $1"
          }
          setenv GHOLA_PRIVATE_ACCOUNT_DATABASE_URL "$DB_URL"
          setenv GHOLA_PRIVATE_AGENT_STATE_STORE "postgres"
          setenv GHOLA_PRIVATE_AGENT_STATE_POSTGRES_URL "$DB_URL"
          setenv GHOLA_PRIVATE_AGENT_EXECUTION_TOKEN "$EXEC_TOKEN"
          setenv GHOLA_PRIVATE_AGENT_PROVISION_TOKEN "$PROV_TOKEN"
          setenv PRIVATE_AGENT_FUNDING_SIGNING_KEY "$FUNDING_SIGNING_KEY"
          setenv GHOLA_FUNDING_WORKER_SIGNER_KEYS_B64 "$FUNDING_SIGNER_PUBLIC_KEY"
          setenv GHOLA_PRIVATE_AGENT_PROVIDER "phala"
          if [ "${{ inputs.arm_phala }}" = "true" ]; then
            # Deliberate re-arm: Phala key present, JIT on, lockdowns off.
            setenv PHALA_CLOUD_API_KEY "$PHALA_KEY"
            setenv GHOLA_PRIVATE_AGENT_JIT_PROVISIONING "true"
            setenv GHOLA_PRIVATE_AGENT_SPEND_LOCKDOWN "false"
            setenv GHOLA_PRIVATE_AGENT_REMOTE_EXECUTION_DISABLED "false"
            setenv GHOLA_PRIVATE_AGENT_SPEND_ARMED "true"
          else
            # Dark deploy: web surface live, Phala spend impossible.
            rmenv PHALA_CLOUD_API_KEY
            setenv GHOLA_PRIVATE_AGENT_JIT_PROVISIONING "false"
            setenv GHOLA_PRIVATE_AGENT_SPEND_LOCKDOWN "true"
            setenv GHOLA_PRIVATE_AGENT_REMOTE_EXECUTION_DISABLED "true"
            setenv GHOLA_PRIVATE_AGENT_SPEND_ARMED "false"
          fi
          setenv GHOLA_PHALA_PRIVATE_AGENT_CVM_NAME "ghola-private-agent-worker-b437850"
          setenv GHOLA_PRIVATE_AGENT_WORKER_IMAGE "$WORKER_IMAGE"
          setenv GHOLA_PRIVATE_AGENT_WORKER_IMAGE_DIGEST "$WORKER_IMAGE_DIGEST"
          setenv GHOLA_V6_HYPERLIQUID_PILOT_ENABLED "true"
          setenv GHOLA_HYPERLIQUID_LIVE_MODE "${{ inputs.live_mode }}"
          setenv GHOLA_CONNECTOR_HYPERLIQUID_STYLE_MARKET_READINESS "ready"
          setenv GHOLA_HYPERLIQUID_ALLOW_MAINNET "true"
          setenv PRIVATE_AGENT_HYPERLIQUID_POOLED_NETWORK "${{ inputs.pooled_network }}"
          setenv PRIVATE_AGENT_HYPERLIQUID_FULL_TICKET_MAX_NOTIONAL_USD "100"
          setenv PRIVATE_AGENT_HYPERLIQUID_FULL_TICKET_DAILY_NOTIONAL_CAP_USD "500"
          setenv PRIVATE_AGENT_HYPERLIQUID_MAX_SLIPPAGE_BPS "100"

      - name: Deploy production to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          url=$(npx vercel@latest deploy --prod --yes --archive=tgz --token "$VERCEL_TOKEN")
          echo "deployment_url=$url" >> "$GITHUB_ENV"
          echo "## Web deployed" >> "$GITHUB_STEP_SUMMARY"
          echo "- $url" >> "$GITHUB_STEP_SUMMARY"

      - name: Provision worker CVM via app
        if: ${{ inputs.arm_phala == 'true' }}
        env:
          PROV_TOKEN: ${{ steps.tokens.outputs.prov_token }}
        run: |
          set -euo pipefail
          base="${{ inputs.base_url }}"
          echo "Provisioning worker through $base/api/private-agent/provision"
          out=$(curl -sS -m 290 -X POST "$base/api/private-agent/provision" \
            -H "authorization: Bearer $PROV_TOKEN" \
            -H "content-type: application/json" -d '{}')
          echo "$out" | head -c 2000
          echo "## Worker provisioning" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$out" | head -c 1500 >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Verify live endpoints
        env:
          AUTH_SMOKE_BASE_URL: ${{ inputs.base_url }}
          AUTH_SMOKE_EMAIL: ${{ secrets.GHOLA_AUTH_SMOKE_EMAIL }}
          AUTH_SMOKE_PASSWORD: ${{ secrets.GHOLA_AUTH_SMOKE_PASSWORD }}
        run: |
          set -euo pipefail
          base="${{ inputs.base_url }}"
          fail=0
          check() {
            local name="$1" path="$2"
            local body
            body=$(curl -fsS -m 30 "$base$path" || echo '{"error":"request_failed"}')
            echo "### $name (\`$path\`)" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            echo "$body" | head -c 1200 >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "$body"
          }
          echo "## Verification" >> "$GITHUB_STEP_SUMMARY"
          runtime=$(check "Private agent runtime" "/api/private-agent/status")
          launch=$(check "Private trading launch" "/v1/private-account/launch/status")
          platforms=$(check "Platform readiness" "/v1/private-account/platforms/readiness")
          if [ -n "$AUTH_SMOKE_EMAIL" ]; then
            (cd apps/web && npm install --no-audit --no-fund >/dev/null 2>&1 && node scripts/smoke-auth.mjs) \
              && echo "- auth smoke: PASS" >> "$GITHUB_STEP_SUMMARY" \
              || { echo "- auth smoke: FAIL" >> "$GITHUB_STEP_SUMMARY"; fail=1; }
          else
            echo "- auth smoke: skipped (no smoke secrets)" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${{ inputs.arm_phala }}" = "true" ]; then
            echo "$launch" | grep -q '"ready_to_accept_users"[: ]*true' \
              && echo "- private trading launch: ready_to_accept_users" >> "$GITHUB_STEP_SUMMARY" \
              || { echo "- private trading launch: NOT ready (see launch status above)" >> "$GITHUB_STEP_SUMMARY"; fail=1; }
          else
            echo "$runtime" | grep -q '"operator_spend_lock"' \
              && echo "- private agent runtime: spend lock active" >> "$GITHUB_STEP_SUMMARY" \
              || { echo "- private agent runtime: spend lock NOT confirmed" >> "$GITHUB_STEP_SUMMARY"; fail=1; }
            echo "$launch" | grep -q '"operator_spend_lock"' \
              && echo "- private trading launch: dark mode confirmed" >> "$GITHUB_STEP_SUMMARY" \
              || { echo "- private trading launch: dark mode NOT confirmed" >> "$GITHUB_STEP_SUMMARY"; fail=1; }
            echo "$platforms" | grep -q '"platform_class"' \
              && echo "- platform readiness: deployed" >> "$GITHUB_STEP_SUMMARY" \
              || { echo "- platform readiness: MISSING from deployment" >> "$GITHUB_STEP_SUMMARY"; fail=1; }
            echo "- phala spend: locked down (arm with arm_phala=true when ready)" >> "$GITHUB_STEP_SUMMARY"
          fi
          exit $fail

      - name: Stop Phala after armed launch proof
        if: ${{ always() && inputs.arm_phala == 'true' && inputs.keep_phala_running != 'true' }}
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
          PHALA_CLOUD_API_PREFIX: ${{ vars.PHALA_CLOUD_API_PREFIX }}
          CVM_NAME: ghola-private-agent-worker-b437850
        run: |
          set -euo pipefail
          if [ -z "${PHALA_CLOUD_API_KEY}" ]; then
            echo "- post-proof Phala stop skipped: PHALA_CLOUD_API_KEY missing" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          work="$RUNNER_TEMP/phala-post-launch-stop"
          mkdir -p "$work"
          cd "$work"
          npm init -y >/dev/null
          npm install --no-audit --no-fund @phala/cloud >/dev/null
          out=$(PHALA_CLOUD_MODULE_DIR="$work" node "$GITHUB_WORKSPACE/scripts/stop-ghola-phala-cvms.mjs" \
            --names "$CVM_NAME" \
            --prefixes "ghola-")
          echo "$out"
          OUT="$out" node <<'NODE'
          const { appendFileSync } = require("node:fs");
          const result = JSON.parse(process.env.OUT || "{}");
          const rows = Array.isArray(result.rows) ? result.rows : [];
          appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            [
              "",
              "## Post-proof Phala stop",
              "",
              "| CVM | Status before | Action |",
              "| --- | --- | --- |",
              ...rows.map((row) => `| \`${row.name || row.id || "unknown"}\` | \`${row.status || "unknown"}\` | \`${row.action || "none"}\` |`),
              "",
            ].join("\n"),
          );
          NODE
