name: Ghola
options:
  bundleIdPrefix: xyz.ghola
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"

targets:
  Ghola:
    type: application
    platform: [iOS, macOS]
    sources:
      - Ghola
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xyz.ghola.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_VERSION: "5.9"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Ghola needs microphone access for voice input."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Ghola uses speech recognition for voice commands."
        INFOPLIST_KEY_CFBundleDisplayName: Ghola
        SUPPORTS_MACCATALYST: false
      configs:
        debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        release:
          CODE_SIGN_IDENTITY: "Apple Distribution"
    entitlements:
      Ghola.entitlements

  GholaTests:
    type: bundle.unit-test
    platform: [iOS, macOS]
    sources:
      - GholaTests
    dependencies:
      - target: Ghola
