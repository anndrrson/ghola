solana_mobile_dapp_publisher_portal:
  google_store_package: xyz.ghola.app
  testing_instructions: |
    The app boots to an onboarding flow explaining how agents work. After
    tapping through onboarding, users reach the home with USDC balance,
    Activity / Agents / Wallet tabs, and a mic FAB.

    To fully exercise agent creation + device control, the app needs a
    backend API key (Qwen Cloud by default). Reviewers can skip this by
    tapping "Not now" on the setup gate — browsing and the Wallet tab
    (showing Seed Vault detection on Seeker) are reachable without any
    sign-in.
