name: Ghola
options:
  bundleIdPrefix: xyz.ghola
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"

packages:
  # MLX Swift — Apple ml-explore Metal-accelerated tensor + LLM runtime.
  # Required for ζ-iOS.1+ on-device inference (see docs/perf/ios-phase-zeta-mlx-plan.md).
  # Latest stable as of 2026-04-01: 0.31.3.
  # NB: 0.31.3 is the upstream tip (2026-04-01) but mlx-swift-examples 2.29.1
  # pins to 0.29.1..<0.30.0. SPM picks the floor that satisfies both; we let
  # mlx-swift-examples drive the version. Upgrade together when examples
  # publishes against 0.31.x.
  MLXSwift:
    url: https://github.com/ml-explore/mlx-swift
    minVersion: "0.29.1"
    maxVersion: "0.30.0"
  # mlx-swift-examples ships the reusable `MLXLLM` / `MLXLMCommon` libraries
  # used by every Apple LLM sample (LLMEval, MLXChatExample). API is pre-1.0;
  # pin upToNextMinor per plan §10 risk #5.
  MLXSwiftExamples:
    url: https://github.com/ml-explore/mlx-swift-examples
    minorVersion: "2.29.1"
  TurnkeySwift:
    url: https://github.com/tkhq/swift-sdk
    from: "4.0.0"

targets:
  Ghola:
    type: application
    platform: [iOS, macOS]
    sources:
      - Ghola
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xyz.ghola.ios
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 2
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Ghola needs microphone access for voice input."
        INFOPLIST_KEY_NSSpeechRecognitionUsageDescription: "Ghola uses speech recognition for voice commands."
        INFOPLIST_KEY_CFBundleDisplayName: Ghola
        INFOPLIST_KEY_NSLocalNetworkUsageDescription: "Ghola uses your local network to connect to Ghola Home servers and for Bonjour discovery."
        INFOPLIST_KEY_NSBonjourServices: "_ghola._tcp."
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_GHOLATurnkeyOrganizationID: "$(GHOLA_TURNKEY_ORG_ID)"
        INFOPLIST_KEY_GHOLATurnkeyAuthProxyConfigID: "$(GHOLA_TURNKEY_AUTH_PROXY_CONFIG_ID)"
        INFOPLIST_KEY_GHOLATurnkeyRPID: "$(GHOLA_TURNKEY_RP_ID)"
        INFOPLIST_KEY_GHOLATurnkeyAppScheme: "$(GHOLA_TURNKEY_APP_SCHEME)"
        GHOLA_TURNKEY_ORG_ID: "c518c546-674f-466d-86dc-17ed819da23f"
        GHOLA_TURNKEY_AUTH_PROXY_CONFIG_ID: "c488409f-bfac-4dd9-a935-b32488591646"
        GHOLA_TURNKEY_RP_ID: ghola.xyz
        GHOLA_TURNKEY_APP_SCHEME: ghola
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTS_MACCATALYST: false
        CODE_SIGN_ENTITLEMENTS: Ghola.entitlements
        # Code signing: rely on Xcode's automatic signing. Don't pin
        # CODE_SIGN_IDENTITY here — pinning "Apple Distribution" for
        # release conflicts with automatic signing because most devs
        # don't have a Distribution cert until they manually provision
        # one for App Store submission. The automatic flow picks
        # "Apple Development" for debug and the right cert for archive
        # builds when DEVELOPMENT_TEAM is set.
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 8RRWJ4U2L7
    dependencies:
      - package: MLXSwift
        product: MLX
      - package: MLXSwift
        product: MLXNN
      - package: MLXSwift
        product: MLXOptimizers
      - package: MLXSwift
        product: MLXRandom
      - package: MLXSwiftExamples
        product: MLXLLM
      - package: MLXSwiftExamples
        product: MLXLMCommon
      - package: TurnkeySwift
        product: TurnkeySwift

  GholaTests:
    type: bundle.unit-test
    platform: [iOS, macOS]
    sources:
      - GholaTests
    dependencies:
      - target: Ghola_${platform}

# Explicit schemes so xcodebuild from CLI can resolve destinations.
# Without these, xcodegen 2.45 auto-generates schemes whose
# `supportedDestinations` list is empty — `xcodebuild` then refuses
# every `-destination` (simulator UDID, generic iOS, etc.) with
# "Supported platforms for the buildables in the current scheme is
# empty". Xcode UI bypasses this via SUPPORTED_PLATFORMS on the
# target, but the CLI path needs the scheme-level annotation.
schemes:
  Ghola_iOS:
    build:
      targets:
        Ghola_iOS: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - GholaTests_iOS
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  Ghola_macOS:
    build:
      targets:
        Ghola_macOS: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - GholaTests_macOS
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
