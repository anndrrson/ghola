name: Build and Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          # CARGO_NET_GITHUB_TOKEN is a fine-grained PAT scoped to read-only
          # access on anndrrson/said (Contents: Read). Required for cargo to
          # fetch the private said-solana git dependency during the build.
          secrets: |
            github_token=${{ secrets.CARGO_NET_GITHUB_TOKEN }}

      - name: Trigger Render deploy
        env:
          HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_ORNI_MODELS }}
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        run: |
          set -euo pipefail
          if [ -z "${HOOK_URL}" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_ORNI_MODELS secret is missing."
            echo "Mint a deploy hook in the Render dashboard: orni-models-api -> Settings -> Deploy Hooks."
            exit 1
          fi
          IMG_ENC=$(python3 -c 'import urllib.parse,sys; print(urllib.parse.quote(sys.argv[1], safe=""))' "${IMAGE_REF}")
          curl -fsS -X POST "${HOOK_URL}?imgURL=${IMG_ENC}"
          echo "Render deploy triggered for ${IMAGE_REF}"
