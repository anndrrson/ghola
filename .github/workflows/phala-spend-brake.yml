name: Phala spend brake

on:
  workflow_dispatch:
    inputs:
      cvm_names:
        description: "Comma-separated Phala CVM names to stop"
        required: true
        default: "ghola-private-agent-worker-d36f9cc,ghola-private-agent-worker-4cbdf74,ghola-private-agent-worker-77ce835,ghola-private-agent-worker-no-submit-f510d61,ghola-private-agent-worker"
      cvm_prefixes:
        description: "Comma-separated Phala CVM name/id prefixes to discover and stop"
        required: true
        default: "ghola-"
      dry_run:
        description: "Report running CVMs without stopping them"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read

concurrency:
  group: phala-spend-brake
  cancel-in-progress: false

jobs:
  stop:
    if: ${{ github.event_name != 'schedule' || vars.GHOLA_PHALA_SPEND_BRAKE_DISABLED != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
      PHALA_CLOUD_API_PREFIX: ${{ vars.PHALA_CLOUD_API_PREFIX }}
      BASE_URL: ${{ vars.GHOLA_PRIVATE_AGENT_BASE_URL }}
      CVM_NAMES: ${{ inputs.cvm_names || 'ghola-private-agent-worker-d36f9cc,ghola-private-agent-worker-4cbdf74,ghola-private-agent-worker-77ce835,ghola-private-agent-worker-no-submit-f510d61,ghola-private-agent-worker' }}
      CVM_PREFIXES: ${{ inputs.cvm_prefixes || 'ghola-' }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v6.0.3

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Stop known Ghola Phala CVMs
        run: |
          set -euo pipefail
          if [ -z "${PHALA_CLOUD_API_KEY}" ]; then
            echo "## Phala spend brake skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "- PHALA_CLOUD_API_KEY is not configured." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          if [ "${{ github.event_name }}" = "schedule" ] && [ "$DRY_RUN" != "true" ]; then
            base="${BASE_URL:-https://ghola.xyz}"
            echo "Running idle-aware Phala stop through $base/api/private-agent/idle"
            out=$(curl -fsS -m 75 "$base/api/private-agent/idle" -H "x-vercel-cron: 1")
            echo "$out"
            OUT="$out" node <<'NODE'
          const { appendFileSync } = require("node:fs");
          const result = JSON.parse(process.env.OUT || "{}");
          const idle = result.idle || {};
          appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            [
              "## Phala spend brake",
              "",
              "- mode: `idle-aware`",
              `- status: \`${idle.status || "unknown"}\``,
              `- attempted: \`${Boolean(idle.attempted)}\``,
              `- stopped: \`${Boolean(idle.stopped)}\``,
              idle.lease_expires_at ? `- lease_expires_at: \`${idle.lease_expires_at}\`` : "",
              idle.reason ? `- reason: \`${idle.reason}\`` : "",
              "",
            ].filter(Boolean).join("\n"),
          );
          NODE
            exit 0
          fi
          work="$RUNNER_TEMP/phala-spend-brake"
          mkdir -p "$work"
          cd "$work"
          npm init -y >/dev/null
          npm install --no-audit --no-fund @phala/cloud >/dev/null
          args=(--names "$CVM_NAMES" --prefixes "$CVM_PREFIXES")
          if [ "$DRY_RUN" = "true" ]; then args+=(--dry-run); fi
          out=$(PHALA_CLOUD_MODULE_DIR="$work" node "$GITHUB_WORKSPACE/scripts/stop-ghola-phala-cvms.mjs" "${args[@]}")
          echo "$out"
          OUT="$out" node <<'NODE'
          const { appendFileSync } = require("node:fs");
          const result = JSON.parse(process.env.OUT || "{}");
          const rows = Array.isArray(result.rows) ? result.rows : [];
          const summary = [
            "## Phala spend brake",
            "",
            `- dry_run: \`${Boolean(result.dry_run)}\``,
            `- prefixes: \`${(result.prefixes || []).join(",") || "none"}\``,
            result.discovered_error ? `- discovery warning: \`${result.discovered_error}\`` : "",
            "",
            "| CVM | Status before | Action |",
            "| --- | --- | --- |",
            ...rows.map((row) => `| \`${row.name || row.id || "unknown"}\` | \`${row.status || "unknown"}\` | \`${row.action || "none"}\` |`),
            "",
          ].filter(Boolean).join("\n");
          appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
          NODE
