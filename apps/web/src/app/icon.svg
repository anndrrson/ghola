<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="112" fill="#08090d"/>

  <!-- Head — fully formed -->
  <circle cx="256" cy="88" r="48" fill="#3da8ff"/>

  <!-- Shoulders — solid, widest element -->
  <rect x="136" y="160" width="240" height="40" rx="20" fill="#3da8ff"/>

  <!-- Chest — solid -->
  <rect x="168" y="224" width="176" height="32" rx="16" fill="#3da8ff"/>

  <!-- Waist — beginning to split -->
  <rect x="176" y="280" width="64" height="28.8" rx="14.4" fill="#3da8ff" opacity="0.75"/>
  <rect x="272" y="280" width="64" height="28.8" rx="14.4" fill="#3da8ff" opacity="0.75"/>

  <!-- Fragments — dispersing -->
  <rect x="144" y="336" width="48" height="24" rx="12" fill="#3da8ff" opacity="0.5"/>
  <rect x="232" y="344" width="48" height="20.8" rx="10.4" fill="#3da8ff" opacity="0.45"/>
  <rect x="320" y="328" width="40" height="20.8" rx="10.4" fill="#3da8ff" opacity="0.4"/>

  <!-- Particles — arriving from below -->
  <circle cx="160" cy="400" r="16" fill="#3da8ff" opacity="0.3"/>
  <circle cx="256" cy="408" r="14.4" fill="#3da8ff" opacity="0.25"/>
  <circle cx="336" cy="392" r="12.8" fill="#3da8ff" opacity="0.2"/>
  <circle cx="208" cy="448" r="11.2" fill="#3da8ff" opacity="0.2"/>
  <circle cx="296" cy="456" r="9.6" fill="#3da8ff" opacity="0.2"/>
</svg>
