name: Pooled testnet ceremony

# Two-phase, zero-capital pooled Hyperliquid testnet enablement.
#
# Phase 1 (mode=address): derive the pool master address from the
#   GHOLA_TESTNET_POOL_SEED secret and print it. Fund that address with
#   testnet USDC (faucet from any wallet with mainnet-deposit history,
#   then transfer; or deposit 5 USDC on mainnet once to unlock the
#   faucet for it directly).
#
# Phase 2 (mode=install): re-derive the master key, programmatically
#   approve a fresh API/agent wallet on testnet (no browser wallet),
#   rebuild the full worker env from Vercel production + guards, and
#   run the sealed pooled-credential install against the Phala CVM.
#   Then verify the managed testnet path through the live Phala worker.
#
# Required secrets:
#   GHOLA_TESTNET_POOL_SEED   one random string you add once (testnet-only;
#                             never reuse for mainnet). CI reads it from the
#                             secrets context and never generates or persists
#                             key material itself.
#   VERCEL_TOKEN
#   PHALA_CLOUD_API_KEY       (install mode)

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Phase"
        required: true
        default: "address"
        type: choice
        options: [address, install]
      ref:
        description: "Git ref with the ceremony + install tooling"
        required: true
        default: "claude/sweet-davinci-z7m2io"
      vercel_project:
        description: "Vercel project serving ghola.xyz"
        required: true
        default: "web"
      base_url:
        description: "Public base URL to verify"
        required: true
        default: "https://ghola.xyz"
      keep_phala_running:
        description: "Keep Phala running after install/canary. Default false stops it to cap spend."
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read

concurrency:
  group: pooled-testnet-ceremony
  cancel-in-progress: false

jobs:
  ceremony:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          ref: ${{ inputs.ref }}

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - name: Preflight
        env:
          SEED: ${{ secrets.GHOLA_TESTNET_POOL_SEED }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          PHALA_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          set -euo pipefail
          missing=()
          [ -n "${SEED}" ] || missing+=("GHOLA_TESTNET_POOL_SEED (one random string you add once; testnet-only, never reuse for mainnet)")
          [ -n "${VERCEL_TOKEN}" ] || missing+=("VERCEL_TOKEN")
          if [ "${{ inputs.mode }}" = "install" ]; then
            [ -n "${PHALA_KEY}" ] || missing+=("PHALA_CLOUD_API_KEY")
          fi
          if [ "${#missing[@]}" -gt 0 ]; then
            { echo "## Ceremony blocked: missing secrets"; for s in "${missing[@]}"; do echo "- \`$s\`"; done; } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Stage seed
        env:
          SEED: ${{ secrets.GHOLA_TESTNET_POOL_SEED }}
        run: |
          set -euo pipefail
          echo "::add-mask::$SEED"
          echo "SEED=$SEED" >> "$GITHUB_ENV"

      - name: Derive pool master
        id: master
        run: |
          set -euo pipefail
          python3 -m pip install --quiet eth-account
          # Mask line goes to stdout; key only into GITHUB_ENV; address only
          # into GITHUB_OUTPUT. v2 derivation path: the v1 key was leaked
          # into a public run log by a piping bug (logs deleted, key burned,
          # nothing was ever funded on it).
          python3 - <<'EOF'
          import hashlib, os
          from eth_account import Account

          seed = os.environ["SEED"]
          key = "0x" + hashlib.sha256((seed + "/ghola-testnet-pool/master/v2").encode()).hexdigest()
          acct = Account.from_key(key)
          print(f"::add-mask::{key}")
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"HL_MASTER_PRIVATE_KEY={key}\n")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"address={acct.address}\n")
          print(f"POOL_MASTER_ADDRESS={acct.address}")
          EOF
          echo "## Pool master (testnet-only)" >> "$GITHUB_STEP_SUMMARY"
          echo "- address: see POOL_MASTER_ADDRESS in this step's log" >> "$GITHUB_STEP_SUMMARY"

      - name: Funding instructions (address mode)
        if: ${{ inputs.mode == 'address' }}
        run: |
          {
            echo ""
            echo "Fund this address with testnet USDC at app.hyperliquid-testnet.xyz:"
            echo "1. Claim the faucet from any wallet that has deposited on Hyperliquid mainnet, then transfer to the address above (testnet transfers are free), OR"
            echo "2. Deposit 5 USDC on mainnet from this address once to unlock the faucet for it directly."
            echo ""
            echo "Then re-run this workflow with mode=install."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Verify pool funded (install mode)
        if: ${{ inputs.mode == 'install' }}
        env:
          POOL_MASTER_ADDRESS: ${{ steps.master.outputs.address }}
        run: |
          set -euo pipefail
          body=$(curl -fsS -X POST https://api.hyperliquid-testnet.xyz/info \
            -H 'Content-Type: application/json' \
            --data "{\"type\":\"clearinghouseState\",\"user\":\"${POOL_MASTER_ADDRESS}\"}")
          account_value=$(BODY="$body" node <<'EOF'
          const body = JSON.parse(process.env.BODY || "{}");
          const value = Number.parseFloat(body?.marginSummary?.accountValue || "0");
          console.log(Number.isFinite(value) ? value : 0);
          EOF
          )
          if ! ACCOUNT_VALUE="$account_value" node -e 'process.exit(Number(process.env.ACCOUNT_VALUE || "0") > 0 ? 0 : 1)'; then
            drip=$(curl -sS -X POST https://api.hyperliquid-testnet.xyz/info \
              -H 'Content-Type: application/json' \
              --data "{\"type\":\"claimDrip\",\"user\":\"${POOL_MASTER_ADDRESS}\"}" || true)
            {
              echo "## Install blocked: Hyperliquid testnet pool is unfunded"
              echo "- pool master: \`${POOL_MASTER_ADDRESS}\`"
              echo "- account value: \`${account_value}\`"
              echo "- faucet response: \`${drip}\`"
              echo ""
              echo "Fund the pool with testnet USDC before re-running install. Hyperliquid requires the recipient address to exist on mainnet before the faucet can drip directly."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "- pool funded on Hyperliquid testnet: account value ${account_value}" >> "$GITHUB_STEP_SUMMARY"

      - name: Approve agent wallet on testnet
        if: ${{ inputs.mode == 'install' }}
        run: |
          set -euo pipefail
          python3 -m pip install --quiet hyperliquid-python-sdk eth-account
          python3 scripts/hyperliquid-approve-agent.py --network testnet --agent-name ghola-pooled > /tmp/managed-accounts.json
          node -e "JSON.parse(require('fs').readFileSync('/tmp/managed-accounts.json','utf8')); console.log('managed accounts JSON valid')"
          echo "- agent approved on testnet" >> "$GITHUB_STEP_SUMMARY"

      - name: Build pooled credentials env
        if: ${{ inputs.mode == 'install' }}
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          mkdir -p .dev
          {
            echo "PRIVATE_AGENT_HYPERLIQUID_MANAGED_ACCOUNTS_JSON_B64=$(base64 -w0 /tmp/managed-accounts.json)"
            echo "PRIVATE_AGENT_HYPERLIQUID_APPROVAL_EVIDENCE=Agent wallet approved programmatically via ApproveAgent on Hyperliquid testnet; ceremony run ${RUN_URL}; SDK response status ok"
          } > .dev/pooled-credentials.env
          rm /tmp/managed-accounts.json

      - name: Pull Vercel production env and build worker env
        if: ${{ inputs.mode == 'install' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          set -euo pipefail
          npx vercel@latest link --yes --project "${{ inputs.vercel_project }}" --token "$VERCEL_TOKEN"
          npx vercel@latest env pull .dev/vercel-production.env --environment=production --yes --token "$VERCEL_TOKEN"
          node scripts/build-phala-worker-env.mjs --env .dev/vercel-production.env --out .dev/phala-worker.env

      - name: Sealed install to Phala worker
        if: ${{ inputs.mode == 'install' }}
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
        run: |
          set -euo pipefail
          npm install -g phala >/dev/null 2>&1
          phala auth login "$PHALA_CLOUD_API_KEY" >/dev/null
          node scripts/install-phala-pooled-credentials.mjs \
            --env .dev/pooled-credentials.env \
            --worker-env .dev/phala-worker.env \
            --allow-partial --allow-testnet --venues hyperliquid 2>&1 | tail -40
          echo "- sealed install executed" >> "$GITHUB_STEP_SUMMARY"

      - name: Verify managed testnet canary
        if: ${{ inputs.mode == 'install' }}
        run: |
          set -euo pipefail
          base="${{ inputs.base_url }}"
          echo "## Post-install verification" >> "$GITHUB_STEP_SUMMARY"
          worker_url=$(BASE_URL="$base" node <<'EOF' || true
          const base = process.env.BASE_URL || "https://ghola.xyz";
          const res = await fetch(new URL("/api/private-agent/status", base), { cache: "no-store" });
          if (!res.ok) process.exit(0);
          const runtime = await res.json();
          const providers = Array.isArray(runtime.providers) ? runtime.providers : [];
          const selected = providers.find((provider) => provider.id === runtime.selected_provider) ||
            providers.find((provider) => provider.id === "phala");
          if (selected?.execution_url) console.log(selected.execution_url);
          EOF
          )
          if [ -z "$worker_url" ]; then
            echo "- managed testnet canary blocked: no worker execution URL published by ${base}/api/private-agent/status" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "- worker URL discovered from deployed runtime status" >> "$GITHUB_STEP_SUMMARY"
          PRIVATE_AGENT_WORKER_URL="$worker_url" \
            GHOLA_PRIVATE_AGENT_STAGING_ENV=.dev/phala-worker.env \
            GHOLA_RUN_LIVE_VENUE_CANARY=1 \
            GHOLA_CANARY_VENUE=hyperliquid_managed_testnet \
            GHOLA_CANARY_HYPERLIQUID_NETWORK=testnet \
            GHOLA_CANARY_HYPERLIQUID_QUOTE_SIZE=5 \
            GHOLA_CANARY_HYPERLIQUID_MAX_SLIPPAGE_BPS=50 \
            node scripts/canary/private-agent-venue-live.mjs
          echo "- managed testnet canary passed: allocation, no-submit verify, and reconcile succeeded through Phala" >> "$GITHUB_STEP_SUMMARY"

          body=$(curl -fsS -m 30 "$base/v1/private-account/live-trading/status" || echo '{}')
          echo "- public mainnet pooled status is reported below; testnet canary does not make mainnet pooled trading live." >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          echo "$body" | head -c 1500 >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Stop Phala after testnet ceremony
        if: ${{ always() && inputs.mode == 'install' && inputs.keep_phala_running != 'true' }}
        env:
          PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
          PHALA_CLOUD_API_PREFIX: ${{ vars.PHALA_CLOUD_API_PREFIX }}
          CVM_NAME: ghola-private-agent-worker-no-submit-f510d61
        run: |
          set -euo pipefail
          if [ -z "${PHALA_CLOUD_API_KEY}" ]; then
            echo "- testnet ceremony Phala stop skipped: PHALA_CLOUD_API_KEY missing" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          work="$RUNNER_TEMP/phala-testnet-stop"
          mkdir -p "$work"
          cd "$work"
          npm init -y >/dev/null
          npm install --no-audit --no-fund @phala/cloud >/dev/null
          node --input-type=module <<'NODE'
          import { createClient } from "@phala/cloud";
          import { appendFileSync } from "node:fs";

          const apiKey = process.env.PHALA_CLOUD_API_KEY?.trim();
          const baseURL = process.env.PHALA_CLOUD_API_PREFIX?.trim() || undefined;
          const name = process.env.CVM_NAME || "ghola-private-agent-worker-no-submit-f510d61";
          const client = createClient({ apiKey, ...(baseURL ? { baseURL } : {}) });
          let beforeStatus = "unknown";
          let action = "none";
          try {
            const before = await client.getCvmState({ id: name }, { schema: false });
            beforeStatus = before && typeof before === "object" ? String(before.status ?? "unknown") : "unknown";
            if (beforeStatus !== "stopped" && beforeStatus !== "stopping") {
              await client.stopCvm({ id: name });
              action = "stop_called";
            }
          } catch (error) {
            action = `error: ${error instanceof Error ? error.message.slice(0, 160) : "unknown"}`;
          }
          appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            `\n## Testnet ceremony Phala stop\n- cvm: \`${name}\`\n- status before: \`${beforeStatus}\`\n- action: \`${action}\`\n`,
          );
          console.log(JSON.stringify({ name, before_status: beforeStatus, action }, null, 2));
          NODE
