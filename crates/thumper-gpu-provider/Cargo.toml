[package]
name = "thumper-gpu-provider"
version.workspace = true
edition.workspace = true
license.workspace = true

[features]
default = []
# mock-nitro disables /dev/nsm calls and fakes the attestation quote.
# Used for `cargo test` and developer-machine builds (e.g. macOS) where
# real Nitro hardware isn't available.
mock-nitro = []

[dependencies]
tokio = { workspace = true }
tokio-tungstenite = { workspace = true }
# Rustls is already in the workspace dep graph (via reqwest's
# rustls-tls feature). We pull it in here directly so the relay
# connection can override the TLS SNI when the provider is talking
# to a local vsock-bridge loopback that doesn't match the relay's
# certificate name. See `relay_ws.rs::tls_connect_with_sni_override`.
rustls = { version = "0.23", default-features = false, features = ["std", "tls12", "ring"] }
tokio-rustls = { version = "0.26", default-features = false, features = ["tls12", "ring"] }
webpki-roots = "0.26"
url = "2"
futures = { workspace = true }
async-trait = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
reqwest = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
base64 = { workspace = true }
bs58 = { workspace = true }
hex = { workspace = true }
sha2 = { workspace = true }
rand = { workspace = true }
x25519-dalek = { workspace = true }
ed25519-dalek = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }

thumper-types = { workspace = true }
said-envelope = { workspace = true }
said-attest = { workspace = true }

# Real Nitro Security Module bindings. Only compiled on Linux and only
# when the `mock-nitro` feature is OFF. Inside an EIF this crate links
# against the /dev/nsm syscall surface; on developer machines we use
# the mock path and never touch this dep.
[target.'cfg(target_os = "linux")'.dependencies]
aws-nitro-enclaves-nsm-api = { version = "0.4", optional = true }

[dev-dependencies]
tokio = { workspace = true }
tokio-tungstenite = { workspace = true }
axum = { workspace = true }
futures = { workspace = true }
serde_json = { workspace = true }
