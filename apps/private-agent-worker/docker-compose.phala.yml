services:
  private-agent-worker:
    image: "${GHOLA_PRIVATE_AGENT_WORKER_IMAGE:?set fresh worker image tag}@${GHOLA_PRIVATE_AGENT_WORKER_IMAGE_DIGEST:?set fresh worker image digest}"
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      PORT: "8787"
      PRIVATE_AGENT_PROVIDER_ID: "phala"
      PRIVATE_AGENT_TEE_KIND: "phala"
      PRIVATE_AGENT_EXECUTION_TOKEN: "${PRIVATE_AGENT_EXECUTION_TOKEN}"
      PRIVATE_AGENT_WORKER_CAPABILITY_SECRET: "${PRIVATE_AGENT_WORKER_CAPABILITY_SECRET:?set shared web-to-worker capability secret}"
      PRIVATE_AGENT_REQUIRE_WORKER_CAPABILITY: "${PRIVATE_AGENT_REQUIRE_WORKER_CAPABILITY:-true}"
      PRIVATE_AGENT_STATE_STORE: "${PRIVATE_AGENT_STATE_STORE:-postgres}"
      PRIVATE_AGENT_STATE_SINGLE_CVM_OK: "${PRIVATE_AGENT_STATE_SINGLE_CVM_OK:-false}"
      PRIVATE_AGENT_STATE_POSTGRES_URL: "${PRIVATE_AGENT_STATE_POSTGRES_URL:-}"
      DATABASE_URL: "${DATABASE_URL:-}"
      PRIVATE_AGENT_REQUIRE_DSTACK_QUOTE: "true"
      PRIVATE_AGENT_FUNDING_SIGNING_KEY: "${PRIVATE_AGENT_FUNDING_SIGNING_KEY:?set base64 PKCS8 Ed25519 funding signer key}"
      PHALA_CVM_IMAGE_DIGEST: "${PHALA_CVM_IMAGE_DIGEST}"
      PRIVATE_AGENT_VENUE_DRY_RUN: "${PRIVATE_AGENT_VENUE_DRY_RUN:-false}"
      PRIVATE_AGENT_GLOBAL_KILL_SWITCH: "${PRIVATE_AGENT_GLOBAL_KILL_SWITCH:-false}"
      PRIVATE_AGENT_MAX_VENUE_REQUESTS_PER_MINUTE: "${PRIVATE_AGENT_MAX_VENUE_REQUESTS_PER_MINUTE:-60}"
      PRIVATE_AGENT_MIN_ORDER_NOTIONAL_USD: "${PRIVATE_AGENT_MIN_ORDER_NOTIONAL_USD:-0}"
      PRIVATE_AGENT_AUTOPILOT_LIVE_SUBMIT: "${PRIVATE_AGENT_AUTOPILOT_LIVE_SUBMIT:-false}"
      PRIVATE_AGENT_AUTOPILOT_SWEEP_ENABLED: "${PRIVATE_AGENT_AUTOPILOT_SWEEP_ENABLED:-true}"
      PRIVATE_AGENT_AUTOPILOT_SWEEP_MS: "${PRIVATE_AGENT_AUTOPILOT_SWEEP_MS:-30000}"
      PRIVATE_AGENT_AUTOPILOT_SWEEP_INITIAL_DELAY_MS: "${PRIVATE_AGENT_AUTOPILOT_SWEEP_INITIAL_DELAY_MS:-2500}"
      PRIVATE_AGENT_AUTOPILOT_SIGNAL_MODE: "${PRIVATE_AGENT_AUTOPILOT_SIGNAL_MODE:-live}"
      PRIVATE_AGENT_HYPERLIQUID_ALLOW_MAINNET: "${PRIVATE_AGENT_HYPERLIQUID_ALLOW_MAINNET:-false}"
      PRIVATE_AGENT_HYPERLIQUID_LIVE_MODE: "${PRIVATE_AGENT_HYPERLIQUID_LIVE_MODE:-disabled}"
      PRIVATE_AGENT_HYPERLIQUID_LIVE_MAX_NOTIONAL_USD: "${PRIVATE_AGENT_HYPERLIQUID_LIVE_MAX_NOTIONAL_USD:-5}"
      PRIVATE_AGENT_HYPERLIQUID_DAILY_NOTIONAL_CAP_USD: "${PRIVATE_AGENT_HYPERLIQUID_DAILY_NOTIONAL_CAP_USD:-25}"
      PRIVATE_AGENT_HYPERLIQUID_FULL_TICKET_MAX_NOTIONAL_USD: "${PRIVATE_AGENT_HYPERLIQUID_FULL_TICKET_MAX_NOTIONAL_USD:-}"
      PRIVATE_AGENT_HYPERLIQUID_FULL_TICKET_DAILY_NOTIONAL_CAP_USD: "${PRIVATE_AGENT_HYPERLIQUID_FULL_TICKET_DAILY_NOTIONAL_CAP_USD:-}"
      PRIVATE_AGENT_HYPERLIQUID_MAX_SLIPPAGE_BPS: "${PRIVATE_AGENT_HYPERLIQUID_MAX_SLIPPAGE_BPS:-50}"
      PRIVATE_AGENT_HYPERLIQUID_MANAGED_ACCOUNTS_PATH: "${PRIVATE_AGENT_HYPERLIQUID_MANAGED_ACCOUNTS_PATH:-}"
      PRIVATE_AGENT_COINBASE_PARTNER_POOL_VAULT_PATH: "${PRIVATE_AGENT_COINBASE_PARTNER_POOL_VAULT_PATH:-}"
      PRIVATE_AGENT_COINBASE_PARTNER_POOL_VAULT_JSON: "${PRIVATE_AGENT_COINBASE_PARTNER_POOL_VAULT_JSON:-}"
      PRIVATE_AGENT_COINBASE_LIVE_MODE: "${PRIVATE_AGENT_COINBASE_LIVE_MODE:-disabled}"
      PRIVATE_AGENT_COINBASE_ALLOWED_PRODUCTS: "${PRIVATE_AGENT_COINBASE_ALLOWED_PRODUCTS:-}"
      PRIVATE_AGENT_COINBASE_LIVE_MAX_NOTIONAL_USD: "${PRIVATE_AGENT_COINBASE_LIVE_MAX_NOTIONAL_USD:-}"
      PRIVATE_AGENT_SOLANA_PERPS_LIVE_MODE: "${PRIVATE_AGENT_SOLANA_PERPS_LIVE_MODE:-disabled}"
      PRIVATE_AGENT_SOLANA_PERPS_ALLOW_MAINNET: "${PRIVATE_AGENT_SOLANA_PERPS_ALLOW_MAINNET:-false}"
      PRIVATE_AGENT_SOLANA_PERPS_LIVE_MAX_NOTIONAL_USD: "${PRIVATE_AGENT_SOLANA_PERPS_LIVE_MAX_NOTIONAL_USD:-5}"
      PRIVATE_AGENT_SOLANA_PERPS_FULL_TICKET_MAX_NOTIONAL_USD: "${PRIVATE_AGENT_SOLANA_PERPS_FULL_TICKET_MAX_NOTIONAL_USD:-}"
      PRIVATE_AGENT_SOLANA_PERPS_MAX_SLIPPAGE_BPS: "${PRIVATE_AGENT_SOLANA_PERPS_MAX_SLIPPAGE_BPS:-}"
      PRIVATE_AGENT_SOLANA_PERPS_POOLED_VAULT_PATH: "${PRIVATE_AGENT_SOLANA_PERPS_POOLED_VAULT_PATH:-}"
      PRIVATE_AGENT_SOLANA_PERPS_POOLED_VAULT_JSON: "${PRIVATE_AGENT_SOLANA_PERPS_POOLED_VAULT_JSON:-}"
      PRIVATE_AGENT_SOLANA_RPC_URL: "${PRIVATE_AGENT_SOLANA_RPC_URL:-}"
      PRIVATE_AGENT_SOLANA_PERPS_PRIORITY_FEE_MICRO_LAMPORTS: "${PRIVATE_AGENT_SOLANA_PERPS_PRIORITY_FEE_MICRO_LAMPORTS:-0}"
      PRIVATE_AGENT_BACKPACK_POOLED_ENABLED: "${PRIVATE_AGENT_BACKPACK_POOLED_ENABLED:-false}"
      PRIVATE_AGENT_BACKPACK_LIVE_MODE: "${PRIVATE_AGENT_BACKPACK_LIVE_MODE:-disabled}"
      PRIVATE_AGENT_BACKPACK_API_KEY: "${PRIVATE_AGENT_BACKPACK_API_KEY:-}"
      PRIVATE_AGENT_BACKPACK_API_SECRET: "${PRIVATE_AGENT_BACKPACK_API_SECRET:-}"
      PRIVATE_AGENT_BACKPACK_API_PRIVATE_KEY_B64: "${PRIVATE_AGENT_BACKPACK_API_PRIVATE_KEY_B64:-}"
      PRIVATE_AGENT_BACKPACK_ALLOWED_SYMBOLS: "${PRIVATE_AGENT_BACKPACK_ALLOWED_SYMBOLS:-}"
      PRIVATE_AGENT_BACKPACK_MAX_ORDER_NOTIONAL_USD: "${PRIVATE_AGENT_BACKPACK_MAX_ORDER_NOTIONAL_USD:-}"
      PRIVATE_AGENT_BACKPACK_DAILY_NOTIONAL_CAP_USD: "${PRIVATE_AGENT_BACKPACK_DAILY_NOTIONAL_CAP_USD:-}"
      PRIVATE_AGENT_BACKPACK_POST_ONLY_MM: "${PRIVATE_AGENT_BACKPACK_POST_ONLY_MM:-false}"
      PRIVATE_AGENT_BACKPACK_MAX_SLIPPAGE_BPS: "${PRIVATE_AGENT_BACKPACK_MAX_SLIPPAGE_BPS:-25}"
      PRIVATE_AGENT_BACKPACK_API_URL: "${PRIVATE_AGENT_BACKPACK_API_URL:-}"
      PRIVATE_AGENT_JUPITER_LIVE_MODE: "${PRIVATE_AGENT_JUPITER_LIVE_MODE:-disabled}"
      PRIVATE_AGENT_JUPITER_API_KEY: "${PRIVATE_AGENT_JUPITER_API_KEY:-}"
      PRIVATE_AGENT_JUPITER_ALLOWED_INPUT_MINTS: "${PRIVATE_AGENT_JUPITER_ALLOWED_INPUT_MINTS:-}"
      PRIVATE_AGENT_JUPITER_ALLOWED_OUTPUT_MINTS: "${PRIVATE_AGENT_JUPITER_ALLOWED_OUTPUT_MINTS:-}"
      PRIVATE_AGENT_JUPITER_LIVE_MAX_NOTIONAL_USD: "${PRIVATE_AGENT_JUPITER_LIVE_MAX_NOTIONAL_USD:-}"
      PRIVATE_AGENT_JUPITER_MAX_SLIPPAGE_BPS: "${PRIVATE_AGENT_JUPITER_MAX_SLIPPAGE_BPS:-}"
      PRIVATE_AGENT_JUPITER_PLATFORM_FEE_BPS: "${PRIVATE_AGENT_JUPITER_PLATFORM_FEE_BPS:-0}"
      PRIVATE_AGENT_JUPITER_FEE_ACCOUNT: "${PRIVATE_AGENT_JUPITER_FEE_ACCOUNT:-}"
      PRIVATE_AGENT_JUPITER_FEE_OWNER: "${PRIVATE_AGENT_JUPITER_FEE_OWNER:-}"
      PRIVATE_AGENT_JUPITER_FEE_MINT: "${PRIVATE_AGENT_JUPITER_FEE_MINT:-}"
      PRIVATE_AGENT_JUPITER_FEE_TOKEN_PROGRAM_ID: "${PRIVATE_AGENT_JUPITER_FEE_TOKEN_PROGRAM_ID:-}"
      PRIVATE_AGENT_AUTOPILOT_REVENUE_PREFLIGHT: "${PRIVATE_AGENT_AUTOPILOT_REVENUE_PREFLIGHT:-false}"
      PRIVATE_AGENT_JUPITER_POOLED_VAULT_PATH: "${PRIVATE_AGENT_JUPITER_POOLED_VAULT_PATH:-}"
      PRIVATE_AGENT_JUPITER_POOLED_VAULT_JSON: "${PRIVATE_AGENT_JUPITER_POOLED_VAULT_JSON:-}"
      GHOLA_JUPITER_ALLOWED_INPUT_MINTS: "${GHOLA_JUPITER_ALLOWED_INPUT_MINTS:-}"
      GHOLA_JUPITER_ALLOWED_OUTPUT_MINTS: "${GHOLA_JUPITER_ALLOWED_OUTPUT_MINTS:-}"
      GHOLA_JUPITER_LIVE_MAX_NOTIONAL_USD: "${GHOLA_JUPITER_LIVE_MAX_NOTIONAL_USD:-}"
      GHOLA_JUPITER_MAX_SLIPPAGE_BPS: "${GHOLA_JUPITER_MAX_SLIPPAGE_BPS:-}"
      GHOLA_JUPITER_PLATFORM_FEE_BPS: "${GHOLA_JUPITER_PLATFORM_FEE_BPS:-0}"
      GHOLA_JUPITER_FEE_ACCOUNT: "${GHOLA_JUPITER_FEE_ACCOUNT:-}"
      GHOLA_JUPITER_FEE_OWNER: "${GHOLA_JUPITER_FEE_OWNER:-}"
      GHOLA_JUPITER_FEE_MINT: "${GHOLA_JUPITER_FEE_MINT:-}"
      GHOLA_JUPITER_FEE_TOKEN_PROGRAM_ID: "${GHOLA_JUPITER_FEE_TOKEN_PROGRAM_ID:-}"
      GHOLA_AUTOPILOT_REVENUE_PREFLIGHT: "${GHOLA_AUTOPILOT_REVENUE_PREFLIGHT:-false}"
      GHOLA_SHIELDED_POOL_RELAYER_URL: "${GHOLA_SHIELDED_POOL_RELAYER_URL:-}"
      GHOLA_SHIELDED_POOL_MIN_CONFIRMATIONS: "${GHOLA_SHIELDED_POOL_MIN_CONFIRMATIONS:-}"
      PRIVATE_AGENT_HYPERLIQUID_TIMEOUT_MS: "${PRIVATE_AGENT_HYPERLIQUID_TIMEOUT_MS:-12000}"
    volumes:
      - /var/run/dstack.sock:/var/run/dstack.sock
      - private-agent-data:/data

volumes:
  private-agent-data:
