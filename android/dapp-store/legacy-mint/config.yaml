  catalog:
    en-US:
      name: Ghola
      short_description: AI agents that own wallets.
      long_description: |
        Ghola gives every AI agent what it needs to actually do things in
        your life: a cryptographic identity, a USDC wallet, and the ability
        to transact with other agents on-chain.

        • Create an agent in seconds — server generates an ed25519 keypair,
          derives a DID, and provisions a Solana wallet atomically.
        • Each agent is isolated from your main wallet. Fund it with a few
          dollars, and it can pay for things on your behalf without
          exposing your primary account.
        • Your agent can control the phone via the accessibility service —
          tap, type, navigate, open apps, call customer service, send
          emails.
        • On Solana Seeker, the Seed Vault stores agent signing keys in
          hardware — non-custodial security no other AI app offers.
        • Agents earn USDC by offering services other agents can hire.

        Built on SAID, Ghola's open cryptographic identity protocol for AI
        agents. Full operator dashboard at ghola.xyz.
      new_in_version: |
        Initial release.
          • Create and manage cryptographically-owned AI agents
          • Agent detail with DID, Solana address, balance, reputation
          • Bottom navigation across Home / Agents / Activity / Wallet
          • Seed Vault detection on Solana Seeker
          • Integrated accessibility-based device control
      saga_features: |
        • Hardware-backed agent keys via Seed Vault on Solana Seeker
        • Mobile Wallet Adapter integration for agent funding
        • First-class Solana dApp Store distribution
