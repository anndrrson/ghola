name: Site Canary

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  site-canary:
    name: Public Site Render Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 8
    defaults:
      run:
        working-directory: apps/web
    env:
      GHOLA_SITE_SMOKE_BASE_URL: ${{ vars.GHOLA_WEB_BASE_URL || vars.GHOLA_WEB_URL || 'https://ghola.xyz' }}
      GHOLA_SITE_SMOKE_SCREENSHOT_PATH: .dev/site-smoke-failure.png
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - name: Install Playwright package
        run: npm install --no-save playwright@1.60.0

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run public site render smoke
        run: node scripts/smoke-site-load.mjs

      - name: Open or update outage issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "ghola.xyz public site render canary is failing";
            const marker = "<!-- ghola-site-canary -->";
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              marker,
              "",
              "The scheduled public-site canary failed.",
              "",
              "- Target: `${{ env.GHOLA_SITE_SMOKE_BASE_URL }}`",
              `- Run: ${runUrl}`,
              "- Failure artifacts are attached to the workflow run when available.",
              "",
              "This canary uses a real Chromium render, so it catches blank-shell, CSP, hydration, and fatal browser-runtime failures that plain HTTP checks miss.",
            ].join("\n");
            const { owner, repo } = context.repo;
            for (const label of [
              { name: "site-canary", color: "d73a4a", description: "Production public site render canary" },
              { name: "production", color: "5319e7", description: "Production-impacting issue" },
            ]) {
              try {
                await github.rest.issues.createLabel({ owner, repo, ...label });
              } catch (error) {
                if (error.status !== 422) throw error;
              }
            }
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner,
              repo,
              state: "open",
              labels: "site-canary",
              per_page: 100,
            });
            const issue = existing.find((item) => item.title === title);
            if (issue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issue.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: ["site-canary", "production"],
              });
            }

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: site-smoke-failure
          path: |
            apps/web/.dev/site-smoke-failure.png
            apps/web/.dev/site-smoke-failure.png.json
          if-no-files-found: ignore
          retention-days: 14
