name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  backend:
    name: Backend (build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace
      - name: Test
        run: cargo test --workspace
        env:
          DATABASE_URL: "postgres://invalid"
          SQLX_OFFLINE: "true"

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      # `npm ci` installs strictly from package-lock.json and fails if the
      # lockfile is out of sync — the lockfile-pinning the previous
      # `npm install --frozen-lockfile` (not a valid npm flag) never gave.
      - run: npm ci
      - run: npm test
      - name: Block dangerous HTML sinks
        run: ../../scripts/security/check-dangerous-html.sh
      # The build IS the reproducibility check: passing GIT_COMMIT pins
      # the Next.js build ID deterministically, and the verification
      # script runs `npm run build` twice and asserts the resulting
      # SRI manifest hashes match byte-for-byte. A CDN-tamper attacker
      # cannot change the deployed bundle without producing a
      # manifest_sha256 that differs from what every reviewer + this
      # CI run can recompute from source.
      - name: Reproducible build check (two runs must match)
        env:
          GIT_COMMIT: ${{ github.sha }}
        run: ./scripts/verify-reproducible-build.sh
      - name: Auth client bundle guard
        run: npm run guard:auth-bundle
      # Tier 1C — supply-chain hardening. The build step writes an SRI
      # manifest to public/.well-known/sri-manifest.json. Surface its
      # top-level hash in the CI run summary so it's discoverable from
      # the workflow's run page, and upload the full manifest as an
      # artifact so a reviewer can `gh run download` it for any commit.
      # GitHub's immutable run logs become the out-of-band tamper
      # record for the deployed bundle's hash set.
      - name: Surface SRI manifest hash
        if: always()
        run: |
          set -euo pipefail
          MANIFEST="public/.well-known/sri-manifest.json"
          if [ ! -f "${MANIFEST}" ]; then
            echo "SRI manifest missing — build step did not run the post-build hook."
            exit 1
          fi
          sha=$(jq -r '.manifest_sha256' "${MANIFEST}")
          files=$(jq -r '.file_count' "${MANIFEST}")
          {
            echo "## Web bundle SRI manifest"
            echo ""
            echo "- **Commit:** \`${GITHUB_SHA}\`"
            echo "- **Files hashed:** ${files}"
            echo "- **manifest_sha256:** \`${sha}\`"
            echo ""
            echo "Reviewers: \`gh run download ${GITHUB_RUN_ID} --name sri-manifest\`"
          } >> "${GITHUB_STEP_SUMMARY}"
      - name: Upload SRI manifest
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sri-manifest
          path: apps/web/public/.well-known/sri-manifest.json
          retention-days: 90

  aleo-mainnet-safe:
    name: Aleo program mainnet-safety gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Machine gate replacing "audit the Aleo bytecode by inspection".
      # Fails the build if programs/aleo/ghola_pay/src/main.leo (or a built
      # build/main.aleo) declares any transition/function other than `pay`
      # — i.e. blocks a `mint_for_testing` (or any mint) from ever shipping
      # in the mainnet program, which would be an infinite-mint hole. Runs
      # in merge mode here (placeholder USDCx type is allowed until bridge
      # integration lands; the deploy-time gate `--mode=deploy` enforces
      # that separately, immediately before a mainnet deploy).
      - name: Aleo mainnet-safety gate (merge mode)
        run: ./scripts/security/check-aleo-mainnet-safe.sh --mode=merge

  shielded-pool-mainnet-safe:
    name: Shielded-pool mainnet-safety gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Machine gate replacing the DO-NOT-DEPLOY comment banner on the
      # said-shielded-pool Groth16 verifying key. The escrow/mint security
      # logic is already in the code; this blocks the remaining ways to ship
      # an unsafe binary: a stale VK that no longer matches the circuit, a VK
      # not backed by a real multi-party ceremony (SPEC.md §13), an
      # attestation bound to a different circuit, or dropping `real-verifier`
      # from default features (which stubs proof verification). Merge mode
      # does not block while the VK is honestly self-marked STALE; the
      # deploy-time gate `--mode=deploy` enforces the full ceremony
      # requirement immediately before a mainnet deploy.
      - name: Shielded-pool mainnet-safety gate (merge mode)
        run: ./scripts/security/check-shielded-pool-mainnet-safe.sh --mode=merge

  envelope-vector-drift:
    name: Envelope vector-drift gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Regenerate the committed parity vectors. Any drift (Rust crate
      # wire-format change, dep upgrade that perturbs ChaCha output, etc.)
      # will alter envelope_vectors.json and the diff step will fail the
      # build. Drift is opt-in — the developer regenerates intentionally
      # and commits the new fixture.
      - name: Regenerate envelope_vectors.json
        run: |
          cargo run -p said-envelope --example gen_vectors -- \
            --out android/app/src/test/resources/envelope_vectors.json
      - name: Diff against committed fixture
        run: |
          git diff --exit-code android/app/src/test/resources/envelope_vectors.json

  android:
    name: Android (lint + unit tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Unit tests
        run: ./gradlew :app:testDebugUnitTest --stacktrace

  docker:
    name: Docker (build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release-gate:
    name: Release Gate (canary + security)
    # Runs on BOTH pull_request and push-to-main (see top-level `on:`).
    # The security scan below must gate the MERGE, so it can no longer be
    # restricted to `refs/heads/main` (that made it skip every PR and only
    # fire post-merge, where it can fail a push but cannot block the PR).
    # The canary-freshness check is inherently a main-branch concern and is
    # gated to main at the step level instead.
    needs:
      - backend
      - frontend
      - aleo-mainnet-safe
      - shielded-pool-mainnet-safe
      - envelope-vector-drift
      - android
      - docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install scanners
        run: |
          set -euo pipefail
          cargo install --locked cargo-audit
          cargo install --locked cargo-deny

      # Generate the security-findings report from REAL scanner output
      # rather than trusting a hand-edited committed file. cargo-audit and
      # cargo-deny advisory hits count as High (RustSec does not grade
      # advisories by CVSS, so any unignored advisory is treated as High);
      # npm audit reports its own high/critical severities. The ignore
      # lists in .cargo/audit.toml and deny.toml still apply — anything NOT
      # ignored there surfaces here and blocks the gate.
      - name: Run security scans + generate findings report
        id: scan
        run: |
          set -uo pipefail
          mkdir -p .github/security
          report=".github/security/security-findings.json"

          # ---- cargo audit (RustSec) -> JSON ----
          # FAIL-CLOSED. cargo-audit's exit code is:
          #   0  = ran clean, no unignored advisories
          #   1  = ran clean, found vulnerabilities (we read the count below)
          #   >1 = the tool itself errored (DB fetch failed, bad lockfile,
          #        panic, etc.) — the scan did NOT effectively run.
          # The old `|| true` + `// 0` swallowed every one of those error
          # cases as "0 vulns", letting the gate pass with the scanner not
          # having run. We now distinguish ran-clean from errored and abort
          # the job on a real error instead of reporting a false zero.
          cargo_audit_rc=0
          cargo audit --json > /tmp/cargo-audit.json 2>/tmp/cargo-audit.err || cargo_audit_rc=$?
          if [ "${cargo_audit_rc}" -gt 1 ]; then
            echo "::error::cargo-audit errored (exit ${cargo_audit_rc}); the advisory scan did not run."
            echo "----- cargo-audit stderr -----"
            cat /tmp/cargo-audit.err || true
            exit 1
          fi
          # Assert the report is well-formed AND that the scanner actually
          # had data to scan: the advisory DB loaded (advisory-db count > 0)
          # and the lockfile parsed (dependency count > 0). A truncated /
          # garbage / empty JSON, or a run against an empty DB, fails here
          # rather than silently yielding 0.
          if ! jq -e '(.database.advisory_count // .database["advisory-count"] // 0) > 0
                      and (.lockfile.dependency_count // .lockfile["dependency-count"] // 0) > 0' \
                 /tmp/cargo-audit.json >/dev/null 2>&1; then
            echo "::error::cargo-audit report malformed or advisory DB/lockfile not loaded; refusing to treat as a clean scan."
            echo "----- cargo-audit stdout (head) -----"
            head -c 2000 /tmp/cargo-audit.json || true
            echo
            echo "----- cargo-audit stderr -----"
            cat /tmp/cargo-audit.err || true
            exit 1
          fi
          cargo_audit_vulns="$(jq -r '.vulnerabilities.count // 0' /tmp/cargo-audit.json)"
          [[ "${cargo_audit_vulns}" =~ ^[0-9]+$ ]] || {
            echo "::error::cargo-audit vulnerability count not numeric: '${cargo_audit_vulns}'"
            exit 1
          }

          # ---- cargo deny (advisories section) ----
          # Exit code is non-zero on any advisory/ban/license/source error.
          if cargo deny --all-features check advisories 2>/tmp/cargo-deny.log; then
            cargo_deny_high=0
          else
            cargo_deny_high=1
          fi

          # ---- npm audit (web app lockfile) -> JSON ----
          npm_high=0
          npm_critical=0
          if [ -f apps/web/package-lock.json ]; then
            ( cd apps/web && npm audit --audit-level=high --json > /tmp/npm-audit.json 2>/dev/null ) || true
            npm_high="$(jq -r '[.vulnerabilities[]?|select(.severity=="high")]|length' /tmp/npm-audit.json 2>/dev/null || echo 0)"
            npm_critical="$(jq -r '[.vulnerabilities[]?|select(.severity=="critical")]|length' /tmp/npm-audit.json 2>/dev/null || echo 0)"
            [[ "${npm_high}" =~ ^[0-9]+$ ]] || npm_high=0
            [[ "${npm_critical}" =~ ^[0-9]+$ ]] || npm_critical=0
          fi

          # RustSec advisories carry no CVSS grade; treat every unignored
          # one as High. npm critical maps to critical, npm high to high.
          high=$(( cargo_audit_vulns + cargo_deny_high + npm_high ))
          critical=$(( npm_critical ))

          jq -n \
            --arg generated_at "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg commit "${GITHUB_SHA}" \
            --argjson critical "${critical}" \
            --argjson high "${high}" \
            --argjson cargo_audit "${cargo_audit_vulns}" \
            --argjson cargo_deny "${cargo_deny_high}" \
            --argjson npm_high "${npm_high}" \
            --argjson npm_critical "${npm_critical}" \
            '{
              generated_at: $generated_at,
              commit: $commit,
              source: "ci-generated-from-scanner-output",
              counts: { critical: $critical, high: $high, medium: 0, low: 0 },
              breakdown: {
                cargo_audit_vulnerabilities: $cargo_audit,
                cargo_deny_advisory_errors: $cargo_deny,
                npm_audit_high: $npm_high,
                npm_audit_critical: $npm_critical
              }
            }' > "${report}"

          echo "Generated ${report}:"
          cat "${report}"

      - name: Enforce zero High/Critical findings
        run: |
          set -euo pipefail
          report=".github/security/security-findings.json"
          if [ ! -f "${report}" ]; then
            echo "Missing ${report} — scan step did not run."
            exit 1
          fi
          # Reject the legacy hand-maintained file: a freshly generated
          # report MUST carry the CI source marker.
          source="$(jq -r '.source // ""' "${report}")"
          if [ "${source}" != "ci-generated-from-scanner-output" ]; then
            echo "Security gate refused: ${report} is not freshly generated from scanner output (source='${source}')."
            exit 1
          fi
          high="$(jq -r '.counts.high // 0' "${report}")"
          critical="$(jq -r '.counts.critical // 0' "${report}")"
          if [ "${high}" != "0" ] || [ "${critical}" != "0" ]; then
            echo "Security gate failed: high=${high}, critical=${critical}"
            jq '.breakdown' "${report}"
            exit 1
          fi
          echo "Security gate passed: 0 high, 0 critical."

      - name: Upload security findings report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-findings
          path: .github/security/security-findings.json
          retention-days: 90

      - name: Enforce latest canary pass
        # Canary runs are a main-branch concept (the query below filters
        # `branch=main`); a PR head has no per-PR canary, so this freshness
        # gate only applies on push-to-main. The security scan above runs
        # on PRs and main alike so it gates the merge.
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          API_URL: ${{ github.api_url }}
        run: |
          set -euo pipefail
          runs_json="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${API_URL}/repos/${REPO}/actions/workflows/canary-private.yml/runs?branch=main&per_page=1")"

          total="$(echo "${runs_json}" | jq -r '.total_count // 0')"
          if [ "${total}" = "0" ]; then
            echo "No canary runs found for canary-private.yml"
            exit 1
          fi

          status="$(echo "${runs_json}" | jq -r '.workflow_runs[0].status // ""')"
          conclusion="$(echo "${runs_json}" | jq -r '.workflow_runs[0].conclusion // ""')"
          started_at="$(echo "${runs_json}" | jq -r '.workflow_runs[0].run_started_at // ""')"
          if [ "${status}" != "completed" ] || [ "${conclusion}" != "success" ]; then
            echo "Latest canary is not passing (status=${status}, conclusion=${conclusion})"
            exit 1
          fi
          if [ -z "${started_at}" ]; then
            echo "Latest canary missing run_started_at"
            exit 1
          fi
          now_epoch="$(date -u +%s)"
          started_epoch="$(date -u -d "${started_at}" +%s)"
          age_minutes="$(((now_epoch - started_epoch) / 60))"
          if [ "${age_minutes}" -gt 15 ]; then
            echo "Latest canary is stale (${age_minutes} minutes old)"
            exit 1
          fi
