[workspace]
members = [
    "crates/said-types",
    "crates/said-core",
    "mcp-server",
    "cli",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MIT OR Apache-2.0"

[workspace.dependencies]
# Crypto
ed25519-bip32 = "0.4"
bip39 = { version = "2", features = ["rand"] }
aes-gcm = "0.10"
hkdf = "0.12"
sha2 = "0.10"
ed25519-dalek = { version = "2", features = ["serde", "rand_core"] }
rand = "0.8"
zeroize = { version = "1.3", features = ["derive"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Async
tokio = { version = "1", features = ["full"] }

# MCP
rmcp = { version = "0.15", features = ["server", "transport-io"] }

# CLI
clap = { version = "4", features = ["derive"] }

# Error handling
thiserror = "2"

# Schema
schemars = { version = "1", features = ["uuid1", "chrono04"] }

# Misc
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
dirs = "6"
base64 = "0.22"

# Internal
said-types = { path = "crates/said-types" }
said-core = { path = "crates/said-core" }
said-mcp = { path = "mcp-server" }
