[package]
name = "thumper-relay"
version.workspace = true
edition.workspace = true
license.workspace = true

[lib]
name = "thumper_relay"
path = "src/lib.rs"

[[bin]]
name = "thumper-relay"
path = "src/main.rs"

[dependencies]
thumper-types = { path = "../thumper-types" }
said-attest = { workspace = true }
said-envelope = { workspace = true }
said-noncecache = { workspace = true }
tokio = { workspace = true }
axum = { workspace = true }
tower = { workspace = true }
tower-http = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
futures = { workspace = true }
base64 = { workspace = true }
ed25519-dalek = { workspace = true }
uuid = { workspace = true }
dashmap = { workspace = true }
axum-server = { version = "0.7", features = ["tls-rustls"] }
async-stream = { workspace = true }
sha2 = { workspace = true }
hex = { workspace = true }
chrono = { workspace = true }
# OHTTP gateway (RFC 9458): HPKE primitives reuse the rest of the codebase's
# vendored crypto. No external `ohttp`/`hpke` crate so we keep transitive deps
# (and platform-tools rustc compatibility) under control.
x25519-dalek = { workspace = true }
hkdf = { workspace = true }
aes-gcm = { workspace = true }
rand = { workspace = true }
clap = { workspace = true }
# Per-request derived key material is wrapped in Zeroizing<>/derives
# ZeroizeOnDrop so AEAD keys, base_nonce, and HPKE exporter secrets are
# wiped from memory when the request finishes. Already a transitive dep
# via ed25519-dalek; declaring explicitly to keep the contract visible.
zeroize = { version = "1", features = ["derive"] }
# Used by the sealed-auth middleware to poll thumper-cloud's /v1/did-set.
reqwest = { workspace = true }

[dev-dependencies]
said-envelope = { workspace = true }
tower = { workspace = true }
http-body-util = "0.1"
