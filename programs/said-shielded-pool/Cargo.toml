[package]
name = "said-shielded-pool"
version = "0.1.0"
description = "Ghola SAID shielded pool — Groth16-verified anonymous payments on Solana"
edition = "2021"

[lib]
crate-type = ["cdylib", "lib"]

[features]
no-entrypoint = []
no-idl = []
no-log-ix-name = []
cpi = ["no-entrypoint"]
default = ["real-verifier"]
idl-build = ["anchor-lang/idl-build", "anchor-spl/idl-build"]
# When enabled, the on-chain Groth16 verifier (groth16-solana) is invoked.
# When disabled (default), the verifier returns Ok(()) — useful for
# integration-shape testing before the prover + verifying key are wired.
# Phase 38 will flip this on in CI / mainnet builds.
real-verifier = ["dep:groth16-solana"]

[dependencies]
anchor-lang = { version = "0.30.1", features = ["init-if-needed"] }
anchor-spl = { version = "0.30.1", features = ["token", "token_2022"] }
# Groth16 BN254 verifier using Solana's alt_bn128 syscalls.
# See https://github.com/Lightprotocol/groth16-solana
groth16-solana = { version = "0.2.0", optional = true }
