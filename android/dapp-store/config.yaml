# Phase M9: Solana dApp Store publishing config.
#
# Consumed by `npx @solana-mobile/dapp-store-cli publish create|submit`.
# See https://docs.solanamobile.com/dapp-publishing/overview for the full
# schema. Fields marked TODO must be filled in before submission:
#   - Asset paths (icons, screenshots) need to be added to /android/dapp-store/assets/
#   - Publisher on-chain account must be funded with a small amount of SOL
#   - Copy any final marketing strings from /android/dapp-store/release-notes.txt

publisher:
  name: Ghola
  website: https://ghola.xyz
  email: hello@ghola.xyz

app:
  android_package: xyz.ghola.app

release:
  address: # populated by the CLI on first `publish create`
  media:
    # TODO: add a 512x512 app icon PNG at assets/icon.png
    - purpose: icon
      uri: assets/icon.png
      mime: image/png
    # TODO: add 6-8 screenshots at the Seeker resolution (1080x2400 recommended)
    - purpose: screenshot
      uri: assets/screenshots/01_agents.png
      mime: image/png
    - purpose: screenshot
      uri: assets/screenshots/02_detail.png
      mime: image/png
    - purpose: screenshot
      uri: assets/screenshots/03_create.png
      mime: image/png
    - purpose: screenshot
      uri: assets/screenshots/04_wallet.png
      mime: image/png

  catalog:
    en-US:
      name: Ghola
      short_description: |
        Off-the-record AI chat. End-to-end encrypted. Pay per query in stablecoins.
      long_description: |
        Ghola is private AI chat — and we can prove it.

        Every message is end-to-end encrypted in your browser. The keys live
        in your wallet, not in our cloud. No email, no password, no profile.
        Even we can't read what you write.

        • Pay per query in stablecoins (USDT or USDC on Solana). No
          subscription. No unused credits. Only pay for what you actually use.
        • Open-weight models — Llama, Qwen, DeepSeek, Mistral, GPT-OSS,
          and more. No proprietary lock-in.
        • Server-blind: chat content never reaches our servers in readable
          form. Pair across devices via QR + ECDH — your sessions follow
          you, your messages stay yours.
        • Optionally create your own AI agents that hold their own wallets,
          earn USDC, and transact with other agents on-chain.

        On Solana Seeker:
        • Hardware-backed identity via Seed Vault — non-custodial security
          no other AI chat app offers.
        • Mobile Wallet Adapter for fast in-app payments.

        Built on SAID, Ghola's open cryptographic identity protocol. Full
        web app at ghola.xyz.
      new_in_version: |
        v0.2.0 — Privacy update
          • End-to-end encrypted chat. Even we can't read your messages.
          • Pair Device flow with QR + ECDH for cross-device sessions.
          • Per-session vault in IndexedDB — encryption keys stay on device.
          • USDT support added alongside USDC.
          • Server-blind architecture across chat, identity, and payments.
          • Refreshed UI — privacy-led across browse, chat, and account.

      saga_features: |
        • Hardware-backed identity keys via Seed Vault
        • Mobile Wallet Adapter for in-app stablecoin payments
        • Solana dApp Store exclusive features

      google_store_package: xyz.ghola.app

  files:
    # TODO: the CLI will substitute the actual APK path on `publish create`
    - purpose: install
      uri: app-release.apk

solana_mobile_dapp_publisher_portal:
  google_store_package: xyz.ghola.app

# Targeted categories; the CLI will validate these against the supported list.
categories:
  - productivity
  - social
