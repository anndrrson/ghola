name: Phala spend brake

on:
  workflow_dispatch:
    inputs:
      cvm_names:
        description: "Comma-separated Phala CVM names to stop"
        required: true
        default: "ghola-private-agent-worker-77ce835,ghola-private-agent-worker-no-submit-f510d61,ghola-private-agent-worker"
      dry_run:
        description: "Report running CVMs without stopping them"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read

concurrency:
  group: phala-spend-brake
  cancel-in-progress: false

jobs:
  stop:
    if: ${{ github.event_name != 'schedule' || vars.GHOLA_PHALA_SPEND_BRAKE_DISABLED != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      PHALA_CLOUD_API_KEY: ${{ secrets.PHALA_CLOUD_API_KEY }}
      PHALA_CLOUD_API_PREFIX: ${{ vars.PHALA_CLOUD_API_PREFIX }}
      CVM_NAMES: ${{ inputs.cvm_names || 'ghola-private-agent-worker-77ce835,ghola-private-agent-worker-no-submit-f510d61,ghola-private-agent-worker' }}
      DRY_RUN: ${{ inputs.dry_run || 'false' }}
    steps:
      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Stop known Ghola Phala CVMs
        run: |
          set -euo pipefail
          if [ -z "${PHALA_CLOUD_API_KEY}" ]; then
            echo "## Phala spend brake skipped" >> "$GITHUB_STEP_SUMMARY"
            echo "- PHALA_CLOUD_API_KEY is not configured." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          work="$RUNNER_TEMP/phala-spend-brake"
          mkdir -p "$work"
          cd "$work"
          npm init -y >/dev/null
          npm install --no-audit --no-fund @phala/cloud >/dev/null
          node --input-type=module <<'NODE'
          import { createClient } from "@phala/cloud";
          import { appendFileSync } from "node:fs";

          const apiKey = process.env.PHALA_CLOUD_API_KEY?.trim();
          const baseURL = process.env.PHALA_CLOUD_API_PREFIX?.trim() || undefined;
          const dryRun = process.env.DRY_RUN === "true";
          const names = (process.env.CVM_NAMES || "")
            .split(",")
            .map((name) => name.trim())
            .filter(Boolean);
          const client = createClient({ apiKey, ...(baseURL ? { baseURL } : {}) });
          const rows = [];

          for (const name of names) {
            try {
              const before = await client.getCvmState({ id: name }, { schema: false });
              const status = before && typeof before === "object" ? String(before.status ?? "") : "";
              let action = "none";
              if (status && status !== "stopped" && status !== "stopping") {
                action = dryRun ? "would_stop" : "stop_called";
                if (!dryRun) await client.stopCvm({ id: name });
              }
              rows.push({ name, status: status || "unknown", action });
            } catch (error) {
              rows.push({
                name,
                status: "unavailable",
                action: "none",
                reason: error instanceof Error ? error.message.slice(0, 180) : "unknown_error",
              });
            }
          }

          const summary = [
            "## Phala spend brake",
            "",
            `- dry_run: \`${dryRun}\``,
            "",
            "| CVM | Status before | Action |",
            "| --- | --- | --- |",
            ...rows.map((row) => `| \`${row.name}\` | \`${row.status}\` | \`${row.action}\` |`),
            "",
          ].join("\n");
          appendFileSync(process.env.GITHUB_STEP_SUMMARY, summary);
          console.log(JSON.stringify({ dry_run: dryRun, rows }, null, 2));
          NODE
