# Ghola v2 — end-to-end smoke stack.
#
# Brings up:
#   - postgres (single DB shared by relay + receipts service)
#   - solana-test-validator
#   - ghola-relay
#   - ghola-gpu-provider (mock-nitro, no real attestation HW)
#   - said-receipts-service (RECEIPTS_BATCH_INTERVAL_SECS=5 so the test
#     doesn't wait an hour for a batch flush)
#
# All services build from the repo root so they share the workspace
# Cargo.lock. The compose file lives under tests/e2e/ but the build
# contexts are written as `../..` (repo root) so docker doesn't have
# to copy `target/` into a parent context.
#
# Usage:
#   docker compose -f tests/e2e/docker-compose.yml up --build
#   bash tests/e2e/v2-private-flow.sh
#   docker compose -f tests/e2e/docker-compose.yml down -v

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ghola
      POSTGRES_PASSWORD: ghola
      POSTGRES_DB: ghola
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ghola"]
      interval: 2s
      timeout: 2s
      retries: 30

  solana-validator:
    # solana/solana-test-validator with a small RPC slice.
    image: solanalabs/solana:v1.18.26
    command:
      - solana-test-validator
      - --rpc-port=8899
      - --bind-address=0.0.0.0
      - --quiet
      - --reset
      - --ledger=/tmp/ledger
    ports:
      - "8899:8899"
      - "8900:8900"
    healthcheck:
      # solana CLI inside the image; exits 0 when getHealth returns ok.
      test: ["CMD-SHELL", "solana cluster-version --url http://localhost:8899 || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 40

  ghola-relay:
    build:
      context: ../..
      dockerfile: Dockerfile.relay
    environment:
      GHOLA_RELAY_BIND: 0.0.0.0:7654
      GHOLA_DEV_MODE: "true"
      # Test-mode flag lets the relay accept providers without a real
      # Nitro quote — uses the said-attest mock path. The provider
      # below runs with --features mock-nitro.
      GHOLA_ALLOW_UNATTESTED: "1"
      RUST_LOG: ghola_relay=debug,info
    ports:
      - "7654:7654"
    depends_on:
      postgres:
        condition: service_healthy

  ghola-gpu-provider:
    build:
      context: ../..
      dockerfile: tests/e2e/Dockerfile.provider-mock
    environment:
      RELAY_URL: ws://ghola-relay:7654/ws
      PROVIDER_NAME: e2e-mock
      MODELS: llama3:8b
      TEE_KIND: none
      # Mock provider uses the fake Ollama responder below.
      OLLAMA_URL: http://mock-ollama:11434
      RUST_LOG: ghola_gpu_provider=debug,info
    depends_on:
      - ghola-relay
      - mock-ollama

  mock-ollama:
    # Tiny Python server that mimics Ollama's /api/generate streaming
    # response. Keeps the e2e self-contained — no real model needed.
    image: python:3.12-alpine
    working_dir: /app
    command: python /app/mock_ollama.py
    volumes:
      - ./mock_ollama.py:/app/mock_ollama.py:ro
    ports:
      - "11434:11434"

  said-receipts-service:
    build:
      context: ../..
      dockerfile: tests/e2e/Dockerfile.receipts
    environment:
      DATABASE_URL: postgres://ghola:ghola@postgres:5432/ghola
      RECEIPTS_BATCH_INTERVAL_SECS: "5"
      SOLANA_RPC_URL: http://solana-validator:8899
      SOLANA_COMMITMENT: confirmed
      # Test-mode: use a pre-funded keypair generated at container
      # build time. Real deploys load this from a Fly secret.
      SOLANA_PAYER_KEY_B64: ""
      RUST_LOG: said_receipts_service=debug,info
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
      solana-validator:
        condition: service_healthy
