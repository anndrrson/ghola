android.useAndroidX=true
android.enableJetifier=true
# v0.7 (Phase γ.1): LiteRT-LM 0.11.0 AAR is JDK 21-compiled (class file
# major version 65). Jetifier — the legacy androidx-migration transform
# — predates JDK 21 and chokes on these bytecodes with
# "Unsupported class file major version 65". The AAR doesn't reference
# any pre-AndroidX symbols, so excluding it from the Jetifier pass is
# safe. See https://issuetracker.google.com/issues?q=componentid:460323
# and the project's google-ai-edge/LiteRT-LM v0.11.0 release notes.
android.jetifier.ignorelist=litertlm-android,litert-android,litertlm-jvm,litert-jvm
org.gradle.jvmargs=-Xmx2048m
