[package]
name = "said-shielded-pool-types"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Shared types for the Ghola Solana-native shielded pool (Groth16/BN254). Used by program, prover, client, relayer, indexer."

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
serde-big-array = "0.5"
sha2 = { workspace = true }
hex = { workspace = true }
thiserror = { workspace = true }
zeroize = { workspace = true }

[dev-dependencies]
rand = { workspace = true }
# Stream 2 (production-hardening) — property-based tests for field-element
# canonicalization, Poseidon range, and BE-32 round-trip.
proptest = "1"
# Used inside the proptest harness for circom-compatible Poseidon range
# checks and BN254 modulus comparisons.
light-poseidon = "0.2"
ark-bn254 = "0.4"
ark-ff = "0.4"
num-bigint = "0.4"

# Stream 2 (production-hardening) — proptest harness for field canonicalization.
[[test]]
name = "field_canon"
path = "proptests/field_canon.rs"
