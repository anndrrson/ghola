name: Private USDCx Fixture Canary

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * *"

jobs:
  fixture-canary:
    name: No-Funds Private USDCx Canary
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GHOLA_WEB_URL: ${{ vars.GHOLA_WEB_URL || 'https://ghola.xyz' }}
      GHOLA_BASE_URL: ${{ vars.GHOLA_BASE_URL || 'https://thumper-cloud.onrender.com' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Run no-funds private USDCx canary
        run: scripts/canary/private-usdcx-fixture.sh
