name: Build ghola-cloud image

on:
  workflow_dispatch:
    inputs:
      ref_to_build:
        description: "Git ref/SHA to build"
        required: true
      image:
        description: "Image tag to push"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Validate image tag
        id: image
        env:
          RAW_IMAGE: ${{ inputs.image }}
        shell: bash
        run: |
          set -euo pipefail
          image="${RAW_IMAGE}"
          owner_repo="$(printf '%s' "${GITHUB_REPOSITORY}" | tr '[:upper:]' '[:lower:]')"
          expected_prefix="ghcr.io/${owner_repo}"
          if printf '%s' "${image}" | LC_ALL=C grep -q '[[:space:][:cntrl:]]'; then
            echo "::error::image contains whitespace or control characters; rejected."
            exit 1
          fi
          if [[ ! "${image}" =~ ^ghcr\.io/[a-z0-9._-]+/[a-z0-9._/-]+:[A-Za-z0-9._-]+$ ]]; then
            echo "::error::image must match ghcr.io/<owner>/<repo>[/<path>]:<tag>, got '${image}'"
            exit 1
          fi
          case "${image}" in
            "${expected_prefix}":*|"${expected_prefix}"/*:*) ;;
            *)
              echo "::error::image must be under ${expected_prefix} (got '${image}')"
              exit 1
              ;;
          esac
          tag="${image##*:}"
          if [ "${tag}" = "latest" ]; then
            echo "::error::refusing to push mutable ':latest'; use an immutable tag"
            exit 1
          fi
          printf 'tag=%s\n' "${BASH_REMATCH[0]}" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref_to_build }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.cloud
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.tag }}
